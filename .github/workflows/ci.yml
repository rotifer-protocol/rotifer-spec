name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "stable"
      - name: Install gitleaks CLI
        run: go install github.com/zricethezav/gitleaks/v8@v8.30.1
      - name: Run gitleaks
        run: |
          "$(go env GOPATH)/bin/gitleaks" git . --no-banner --redact

  cross-contamination:
    name: Cross-Contamination Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Scan for private file paths
        run: |
          CONTAMINATED=$(git log --all --diff-filter=A --name-only --format="" | grep "^internal/" | sort -u || true)
          if [ -n "$CONTAMINATED" ]; then
            echo "::error::⛔ CRITICAL: private files found in commit history!"
            echo "$CONTAMINATED"
            exit 1
          fi
          echo "✅ No contamination detected"
